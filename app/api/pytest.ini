[pytest]
DJANGO_SETTINGS_MODULE = authentication.settings
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --strict-markers
    --cov=authentication
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --tb=short
    --reuse-db
testpaths = authentication/tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    auth: Authentication related tests
    password: Password management tests
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20:ninja.schema
    ignore::pydantic.warnings.PydanticDeprecatedSince20:ninja.conf
