services:
  db:
    image: postgres:16-alpine
    container_name: digitalockbox_db
    environment:
      POSTGRES_DB: ${DB_NAME:-lockbox1}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./digitalockbox_api
      dockerfile: Dockerfile
    container_name: digitalockbox_api
    environment:
      DB_NAME: ${DB_NAME:-lockbox1}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      CLIENT_SECRET: ${CLIENT_SECRET}
      DEBUG: ${DEBUG:-False}
      JWT_ALG: ${JWT_ALG:-ES512}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./digitalockbox_api:/app
      - api_static:/app/staticfiles

  gui:
    build:
      context: ./digitalockbox_gui
      dockerfile: Dockerfile
    container_name: digitalockbox_gui
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000

  api_test:
    build:
      context: ./digitalockbox_api
      dockerfile: Dockerfile.test
    container_name: digitalockbox_api_test
    environment:
      DB_NAME: ${DB_NAME:-lockbox1}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      CLIENT_SECRET: ${CLIENT_SECRET:-test-secret-key-for-testing}
      DEBUG: "True"
      JWT_ALG: HS256
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./digitalockbox_api:/app
      - test_reports:/app/test-reports
    profiles:
      - test

volumes:
  postgres_data:
  api_static:
  test_reports:
